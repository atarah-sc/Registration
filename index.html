

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google Sheets to HTML</title>
<style>
body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f4f9; }
table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
th, td { border: 1px solid #dddddd; text-align: left; padding: 12px; }
th { background-color: #4CAF50; color: white; }
tr:nth-child(even) { background-color: #f2f2f2; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body>

<h2>Data From Google Sheets</h2>
<div id="loading">Loading data...</div>
<table id="data-table" style="display:none;">
<thead>
<tr id="table-header"></tr>
</thead>
<tbody id="table-body"></tbody>
</table>

<script>
// 1. Replace with your actual Google Sheet ID
const sheetId = '1fj8_as7Zr7PVSW9FM599ZnrLWl2DDlZGPVTB_IlNK5M';
// 2. Use the CSV export URL
const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&gid=765649940`;

async function fetchSheetData() {
    try {
        const response = await fetch(url);
        if (!response.ok) throw new Error('Network response was not ok');
        const data = await response.text();

        // Basic CSV parsing: Split by new line, then by comma
        // Note: If your cells contain commas, this simple split will break.
        // For complex data, consider using a library like PapaParse.
        const rows = data.split('\n').map(row => row.split(','));
        
        displayData(rows);
    } catch (error) {
        console.error('Error fetching sheet data:', error);
        document.getElementById('loading').innerText = 'Failed to load data. Ensure the sheet is public.';
    }
}

function displayData(rows) {
const headerRow = document.getElementById('table-header');
const bodyContainer = document.getElementById('table-body');

// Clear placeholders
headerRow.innerHTML = '';
bodyContainer.innerHTML = '';

// Create Headers (First row of the sheet)
const headers = rows[0];
headers.forEach(header => {
const th = document.createElement('th');
th.innerText = header.replace(/"/g, ''); // Clean quotes if any
headerRow.appendChild(th);
});

// Create Rows
for (let i = 1; i < rows.length; i++) {
if (rows[i].length === 1 && rows[i][0] === "") continue; // Skip empty rows

const tr = document.createElement('tr');
rows[i].forEach(cell => {
const td = document.createElement('td');
td.innerText = cell.replace(/"/g, '');
tr.appendChild(td);
});
bodyContainer.appendChild(tr);
}

// Toggle visibility
document.getElementById('loading').style.display = 'none';
document.getElementById('data-table').style.display = 'table';
}

// Run the function on load
fetchSheetData();
</script>
</body>
</html>
