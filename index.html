<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATARAH 2026 — Lookup & Print</title>
<style>
    body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
    .controls { display: flex; gap: 15px; margin-bottom: 20px; }
    .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    select { padding: 10px; width: 200px; }
    @media print { .no-print { display: none; } }
</style>
</head>
<body>

<div class="controls no-print">
    <select id="churchSelect"><option value="">Search by Church</option></select>
    <select id="eventSelect"><option value="">Search by Event</option></select>
    <button onclick="window.print()">Print Results</button>
</div>

<div id="results" class="card">Select a filter to view data.</div>

<script>
// 1. YOUR DATA ARRAY
const DATA = [
  {"church":"All Saints’ Church","events":[{"name":"God in 180 (Short Video)","fee":800},{"name":"Crown of Wisdom (Quiz)","fee":800}]},
  {"church":"Christ The Savior Church","events":[{"name":"God in 180 (Short Video)","fee":800},{"name":"One Voice, One Faith (Solo Singing)","fee":500}]}
  // ... Paste your full original DATA array here ...
];

const churchSelect = document.getElementById('churchSelect');
const eventSelect = document.getElementById('eventSelect');
const results = document.getElementById('results');

// 2. Populate Dropdowns
const allEvents = [...new Set(DATA.flatMap(r => r.events.map(e => e.name)))].sort();

DATA.forEach((r, i) => {
    let opt = document.createElement('option');
    opt.value = i;
    opt.textContent = r.church;
    churchSelect.appendChild(opt);
});

allEvents.forEach(name => {
    let opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name;
    eventSelect.appendChild(opt);
});

// 3. Render Functions
churchSelect.addEventListener('change', (e) => {
    if(!e.target.value) return;
    const r = DATA[e.target.value];
    results.innerHTML = `<h3>${r.church}</h3><ul>${r.events.map(ev => `<li>${ev.name}: ₹${ev.fee}</li>`).join('')}</ul>`;
});

eventSelect.addEventListener('change', (e) => {
    if(!e.target.value) return;
    const filtered = DATA.filter(r => r.events.some(ev => ev.name === e.target.value));
    results.innerHTML = `<h3>Churches for ${e.target.value}</h3><ul>${filtered.map(r => `<li>${r.church}</li>`).join('')}</ul>`;
});
</script>
</body>
</html>
