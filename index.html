<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATARAH 2026 — Church Registration Lookup</title>
    <style>
        /* [Your existing styles remain exactly the same] */
    </style>
</head>
<body>

    <div class="ornament-row"><span></span><span></span><span></span><span></span><span></span></div>

    <header>
        <div class="eyebrow">Cathedral High School · Youth Fellowship</div>
        <h1>ATARAH 2026</h1>
        <div class="subtitle">Registration &amp; Payment Lookup</div>
    </header>

    <main>
        <div class="lookup-card" id="churchCard">
            <label class="field-label" for="churchSelect">Select your church</label>
            <div class="select-wrap">
                <select id="churchSelect">
                    <option value="">— Choose a church —</option>
                </select>
            </div>
            <div id="resultArea"><div class="empty-state">Loading data from database...</div></div>
        </div>

        <div class="lookup-card" id="eventCard">
            <label class="field-label" for="eventSelect">Browse by event</label>
            <div class="select-wrap">
                <select id="eventSelect">
                    <option value="">— Choose an event —</option>
                </select>
            </div>
            <div id="eventResultArea"><div class="empty-state">Loading data from database...</div></div>
        </div>

        <footer>May every voice, every reel, and every step of the street play glorify Him. — ATARAH 2026</footer>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCwZJ2nxGgldI5c5tgsMMI7G_mfQHg0LE4",
            authDomain: "registration-tracking.firebaseapp.com",
            projectId: "registration-tracking",
            storageBucket: "registration-tracking.firebasestorage.app",
            messagingSenderId: "769011346142",
            appId: "1:769011346142:web:4444b17f2a051e0aa1f04f",
            measurementId: "G-H9G3VTBD2Z"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let DATA = [];
        const selectEl = document.getElementById('churchSelect');
        const eventSelectEl = document.getElementById('eventSelect');
        const resultArea = document.getElementById('resultArea');
        const eventResultArea = document.getElementById('eventResultArea');

        // Firestore Listener
        onSnapshot(collection(db, "registrations"), (snapshot) => {
            DATA = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            
            // Re-populate dropdowns
            selectEl.innerHTML = '<option value="">— Choose a church —</option>';
            DATA.forEach((r, i) => {
                const opt = document.createElement('option');
                opt.value = i;
                opt.textContent = r.church;
                selectEl.appendChild(opt);
            });

            const eventNames = Array.from(new Set(DATA.flatMap(r => r.events.map(e => e.name)))).sort();
            eventSelectEl.innerHTML = '<option value="">— Choose an event —</option>';
            eventNames.forEach(name => {
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                eventSelectEl.appendChild(opt);
            });

            // If a selection was active, refresh it
            if (selectEl.value !== "") render(selectEl.value);
            if (eventSelectEl.value !== "") renderEvent(eventSelectEl.value);
        });

        // UI Rendering Functions
        window.render = function(idx) {
            const r = DATA[idx];
            if (!r) return;
            const paidLabel = r.paid ? 'Paid' : 'Payment Pending';
            resultArea.innerHTML = `<div class="church-card">
                <h2>${r.church}</h2>
                <span class="status-pill ${r.paid ? 'paid' : 'unpaid'}">${paidLabel}</span>
                <button class="paid-toggle" onclick="togglePaid('${r.id}', ${r.paid})">
                    Mark as ${r.paid ? 'Payment Pending' : 'Paid'}
                </button>
            </div>`;
        };

        window.renderEvent = function(eventName) {
            const participants = DATA.filter(r => r.events.some(e => e.name === eventName));
            eventResultArea.innerHTML = participants.map(r => `<div>${r.church} - ${r.paid ? 'Paid' : 'Pending'}</div>`).join('');
        };

        window.togglePaid = async function(id, currentStatus) {
            await updateDoc(doc(db, "registrations", id), { paid: !currentStatus });
        };

        selectEl.addEventListener('change', (e) => render(e.target.value));
        eventSelectEl.addEventListener('change', (e) => renderEvent(e.target.value));
    </script>
</body>
</html>
